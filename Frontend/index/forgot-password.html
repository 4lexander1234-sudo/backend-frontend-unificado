<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/Frontend/css/forgot-password.css">
    
    <title>ServiElect</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="bar">
                <div class="bar-center">
                    <div class="bar-one">
                        <div class="bar-one-one"><span class="phone-number"><i class="bi bi-telephone"></i>+573 137 508 128</span></div>
                        <div class="bar-one-two"><span class="email"><i class="bi bi-envelope"></i>info@Servielect.com</span></div>
                    </div>
                    <div class="bar-two"><span class="location"><i class="bi bi-geo-alt"></i>Bogotá,Colombia</span></div>
                </div>
            </div>
            <nav>
                <div class="nav-center">
                    <div class="nav-logo">
                        <img src="/img/image.png.png" alt="Servielect">
                        <div>
                            <p><span class="span-1">S</span>ERVI<span>ELECT</span></p>
                            <p class="p-1">Tecnología & Servicio</p>
                        </div>
                    </div>
                    <div>
                        <ul class="nav-ul">
                            <li><a class="nav-li" href="#section-1" id="inicio">Inicio</a></li>
                            <li><a class="nav-li" href="#section-2" id="productos">Productos</a></li>
                            <li><a class="nav-li" href="#section-4">Servicios</a></li>
                            <li><a class="nav-li" href="#section-5">Nosotros</a></li>
                            <li><a class="nav-li" href="#footer">Contacto</a></li>
                        </ul>
                    </div>
                    <div class="container-login">
                        <div class="login">
                            <ul class="menu-login">
                                <li class="user-login-list"><a id="btnAccount">Crear Cuenta</a></li>
                                <li class="user-login-list"><a id="btnlogin">Iniciar Sesion</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>
        </header>
        <main>
            <section class="section-1" id="section-1">
                <div class="con-section-1">
                    
                    <div class="form">
                        <form id="form-login" class="form-login">
                            <h2>Solicitud de Restauración</h2>
                            <input type="email" id="email" placeholder="Correo Electronico" required>
                            <div class="info_restore">
                                <p>Por favor ingrese su correo electronico con el cual se registro su cuenta</p>
                            </div>
                            <div id="info-login" class="forgot oculto"></div> 
                            <div class="buttons">
                                <button id="go_back" >Regresar</button>
                                <button id="btn_send_request" >Enviar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
<script src="/frontend/javascript/login.js"></script>
<script src="/Frontend/javascript/admin.js"></script>
</html>
